name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Validate tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match pyproject.toml version ($PKG_VERSION)"
            exit 1
          fi
          echo "Tag version matches package version: $PKG_VERSION"

      - name: Build package
        run: uv build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write  # OIDC trusted publishing

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false
          ignore-empty-workdir: true

      - name: Download distribution artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        run: uv publish --trusted-publishing always --publish-url https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC trusted publishing

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false
          ignore-empty-workdir: true

      - name: Download distribution artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
