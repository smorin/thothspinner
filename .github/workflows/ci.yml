name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        if: matrix.python-version == '3.11' && matrix.os != 'macos-latest'
        run: uv run pytest

      - name: Run tests (skip snapshots)
        if: >-
          matrix.python-version != '3.11'
          || matrix.os == 'macos-latest'
        run: >-
          uv run pytest
          --ignore=tests/textual/test_snapshots.py

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Run linter
        run: uv run ruff check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run type checker
        run: uv run ty check src/

  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Run yamllint
        run: uvx yamllint -c .yamllint .

  actionlint:
    name: Action Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install actionlint
        run: bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)

      - name: Run actionlint
        run: ./actionlint

  codespell:
    name: Codespell
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Run codespell
        run: uvx codespell --skip=".git,.venv,htmlcov,uv.lock" --ignore-words-list=digitalizing .

  bandit:
    name: Bandit Security Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run bandit
        run: uvx bandit -r src/ -ll

  file-hygiene:
    name: File Hygiene
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.0.0

      - name: Run editorconfig-checker
        run: uvx --from editorconfig-checker ec

      - name: Check for large files
        run: |
          max_kb=500
          failed=0
          while IFS= read -r -d '' f; do
            if [ -f "$f" ]; then
              size=$(wc -c < "$f" | tr -d ' ')
              if [ "$size" -gt $((max_kb * 1024)) ]; then
                echo "::error file=$f::File is too large ($(( size / 1024 )) KB > ${max_kb} KB)"
                failed=1
              fi
            fi
          done < <(git ls-files -z)
          exit $failed
