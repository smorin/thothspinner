---
# lefthook.yml — Git hooks configuration
# Docs: https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    editorconfig:
      run: uvx --from editorconfig-checker ec {staged_files}

    check-yaml:
      glob: "*.{yml,yaml}"
      run: uvx yamllint -c .yamllint {staged_files}

    check-added-large-files:
      run: |
        max_kb=500
        for f in {staged_files}; do
          if [ -f "$f" ]; then
            size=$(wc -c < "$f" | tr -d ' ')
            if [ "$size" -gt $((max_kb * 1024)) ]; then
              echo "File $f is too large ($(( size / 1024 )) KB > ${max_kb} KB)"
              exit 1
            fi
          fi
        done

    actionlint:
      glob: ".github/workflows/*.{yml,yaml}"
      run: actionlint {staged_files}

    ruff-format:
      glob: "*.py"
      run: uv run ruff format {staged_files}
      stage_fixed: true

    ruff-lint:
      glob: "*.py"
      run: uv run ruff check --fix {staged_files}
      stage_fixed: true

    ty-typecheck:
      glob: "*.py"
      run: uv run ty check src/

    codespell:
      glob: "*.{py,md}"
      run: uvx codespell --skip=".git,.venv,htmlcov,uv.lock" --ignore-words-list=digitalizing {staged_files}

    bandit:
      glob: "*.py"
      run: uvx bandit -r src/ -ll

    pytest:
      run: uv run pytest tests/ -v
